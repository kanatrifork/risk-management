_schema-version: '3.1'
ID: RiskManagement
version: 1.0.0
description: A simple CAP project.
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
  subdomain: f31043e6trial
build-parameters:
  before-all:
    - builder: custom
      commands:
        - rm -rf build/dist
        - mkdir -p build/dist
        - bash -c "cd mtx/sidecar && npm install && cd ../.."
        - rm -rf build/ui-deployer
        - mkdir -p build/ui-deployer
    - builder: custom
      commands:
        - npm install --production
        - >-
          bash -c "cds -v | grep 'cds-dk' || npm i --production --no-save @sap/cds-dk"
        - bash -c "export PATH=$PATH:$(pwd)/node_modules/.bin"
        - cds build --production
  after-all:
    - builder: custom
      commands:
        - npm install
modules:
  - name: RiskManagement-RiskMobile
    type: html5
    path: app/RiskManagement.RiskMobile
    build-parameters:
      builder: custom
      commands:
        - npx mdk build --target module --ui5 --forceUpdate
        - bash -c "cd Web/MDKModule && rm -rf .npmrc && npm install"
        - bash -c "cd Web/MDKModule && npm run build"
        - >-
          bash -c "mv Web/MDKModule/MDKModule-content.zip ../../build/dist/RiskMobile.zip"
        - rm -rf Web/MDKModule/dist
      _artifactName: RiskMobile.zip
      supported-platforms:
        []
      build-result: ../../build/dist
  - name: RiskManagement-riskmanagement.risks
    type: html5
    path: app/riskmanagement.risks
    build-parameters:
      builder: custom
      commands:
        - rm -rf dist-zip dist
        - npm install
        - >-
          npx -p @ui5/cli@^3.0.0 ui5 build --dest dist --include-task=generateCachebusterInfo
        - mkdir dist-zip
        - bash -c "cd dist && npx bestzip ../dist-zip/riskmanagementrisks.zip *"
      _artifactName: riskmanagementrisks.zip
      supported-platforms:
        []
      build-result: dist-zip
  - name: RiskManagement-srv
    type: nodejs
    path: gen/srv
    parameters:
      memory: 256MB
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    build-parameters:
      builder: npm
      ignore:
        - node_modules
        - package-lock.json
    requires:
      - name: RiskManagement-service-uaa
      - name: RiskManagement-service-destination
      - name: RiskManagement-service-metadata
      - name: RiskManagement-service-logs
  - name: RiskManagement-launchpad
    type: html5
    path: build/launchpad
    build-parameters:
      builder: custom
      commands:
        - npm install
        - >-
          npx -p @ui5/cli@^3.0.0 ui5 build --dest dist --include-task=generateCachebusterInfo
        - bash -c "cd dist && npx bestzip ../../../build/dist/launchpad.zip *"
        - rm -rf dist
      _artifactName: launchpad.zip
      supported-platforms:
        []
      build-result: ../../build/dist
  - name: RiskManagement-aux-ui-deployer
    type: com.sap.application.content
    path: build/ui-deployer
    build-parameters:
      build-result: resources
      requires:
        - name: RiskManagement-RiskMobile
          artifacts:
            - RiskMobile.zip
          target-path: resources
        - name: RiskManagement-riskmanagement.risks
          artifacts:
            - riskmanagementrisks.zip
          target-path: resources
        - name: RiskManagement-launchpad
          artifacts:
            - launchpad.zip
          target-path: resources
    requires:
      - name: RiskManagement-service-html5-apps-repo-host
        parameters:
          content-target: true
resources:
  - type: org.cloudfoundry.managed-service
    name: RiskManagement-service-uaa
    parameters:
      service: xsuaa
      service-plan: application
      service-name: RiskManagement-uaa
      path: xs-security.json
      config:
        oauth2-configuration:
          redirect-uris:
            - https://*.${default-domain}/login/*
          credential-types:
            - binding-secret
            - x509
        xsappname: RiskManagement-${org}-${space}
        role-collections:
          - description: RiskManager
            name: RiskManagement-RiskManager-${space}
            role-template-references:
              - $XSAPPNAME.RiskManager
          - description: RiskViewer
            name: RiskManagement-RiskViewer-${space}
            role-template-references:
              - $XSAPPNAME.RiskViewer
  - type: org.cloudfoundry.managed-service
    name: RiskManagement-service-destination
    requires:
      - name: srv-api
    parameters:
      service: destination
      service-plan: lite
      service-name: RiskManagement-destination
      config:
        HTML5Runtime_enabled: true
        version: 1.0.0
        init_data:
          subaccount:
            destinations:
              - Name: RiskManagement-html5-content-rt
                Authentication: NoAuthentication
                ProxyType: Internet
                Type: HTTP
                URL: https://${subdomain}.launchpad.${default-domain}
                CEP.HTML5contentprovider: true
            existing_destinations_policy: update
          instance:
            existing_destinations_policy: ignore
            destinations:
              - Name: ppsaasroute-cfapi
                Description: CF Cloud Controller API
                URL: ${controller-url}
                Type: HTTP
                ProxyType: Internet
                Authentication: OAuth2Password
                tokenServiceURL: ${authorization-url}/oauth/token
                clientId: cf
              - Name: RiskManagement-app-srv
                Description: SusaaS Service API
                URL: ~{srv-api/srv-url}
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                forwardAuthToken: true
  - type: org.cloudfoundry.user-provided-service
    name: RiskManagement-service-metadata
    parameters:
      service: metadata
      service-plan: standard
      service-name: RiskManagement-metadata
      config:
        default-domain: ${default-domain}
  - type: org.cloudfoundry.managed-service
    name: RiskManagement-service-logs
    parameters:
      service: application-logs
      service-plan: lite
      service-name: RiskManagement-logs
  - type: org.cloudfoundry.managed-service
    name: RiskManagement-service-html5-apps-repo-host
    parameters:
      service: html5-apps-repo
      service-plan: app-host
      service-name: RiskManagement-html5-apps-repo-host
